server:
  port: 8082

mysql:
  user: root
  host: 127.0.0.1
  port: "3306"
  database: go_order_management_system

  maxOpenConns: 10
  maxIdleConns: 5
  connMaxLifeTime: 30m
  connMaxIdleTime: 5m
  pingTimeout: 3s

redis:
  addr: 127.0.0.1:6379
  db: 0

rabbitmq:
  url: amqp://order_app:order_dev_password@127.0.0.1:5672/
  connectTimeout: 5s
  reconnectDelay: 5s
  orderTimeout:
    delay: 30m
    outboxPollInterval: 1s
    outboxRetryDelay: 5s
    publishBatchSize: 100
    consumerPrefetch: 10

jwt:
  expireHours: 24

http:
  server:
    readTimeout: 5s
    writeTimeout: 20s
    idleTimeout: 60s
    readHeaderTimeout: 2s
    maxHeaderBytesKib: 128
    timeout: 18s
