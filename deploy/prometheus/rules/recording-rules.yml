groups:
  - name: go-order-service-recording
    interval: 30s
    rules:
      - record: service:http_requests:rate5m
        expr: sum by (service) (rate(go_order_http_server_requests_total[5m]))

      - record: service:http_server_errors:rate5m
        expr: sum by (service) (rate(go_order_http_server_requests_total{status_class="5xx"}[5m]))

      - record: service:http_server_error_ratio:rate5m
        expr: service:http_server_errors:rate5m / clamp_min(service:http_requests:rate5m, 0.001)

      - record: service:http_server_request_duration_seconds:p95
        expr: histogram_quantile(0.95, sum by (service, le) (rate(go_order_http_server_request_duration_seconds_bucket[5m])))

      - record: service:http_client_attempts:rate5m
        expr: sum by (upstream, outcome) (rate(go_order_http_client_attempts_total[5m]))

      - record: worker:up:max
        expr: max by (worker) (go_order_worker_up)
