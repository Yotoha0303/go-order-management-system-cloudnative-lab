rule_files:
  - ../rules/recording-rules.yml
  - ../rules/alert-rules.yml

evaluation_interval: 1m

tests:
  - name: target-down-fires-after-for-window
    interval: 1m
    input_series:
      - series: 'up{job="api-gateway",instance="api-gateway:8082"}'
        values: '0+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: GoOrderTargetDown
        exp_alerts:
          - exp_labels:
              category: availability
              instance: api-gateway:8082
              job: api-gateway
              severity: critical
            exp_annotations:
              summary: Go Order target is unavailable
              description: Prometheus cannot scrape api-gateway at api-gateway:8082 for two minutes.

  - name: healthy-target-does-not-fire
    interval: 1m
    input_series:
      - series: 'up{job="api-gateway",instance="api-gateway:8082"}'
        values: '1+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: GoOrderTargetDown
        exp_alerts: []

  - name: overdue-outbox-fires-after-for-window
    interval: 1m
    input_series:
      - series: 'go_order_outbox_overdue{job="order-service",instance="order-service:8086"}'
        values: '1+0x6'
    alert_rule_test:
      - eval_time: 4m
        alertname: GoOrderOutboxOverdue
        exp_alerts:
          - exp_labels:
              category: outbox
              severity: warning
            exp_annotations:
              summary: Go Order Outbox contains overdue events
              description: At least one timeout Outbox event has remained overdue for three minutes.

  - name: rabbitmq-session-loss-fires-and-healthy-does-not
    interval: 1m
    input_series:
      - series: 'go_order_rabbitmq_session_up{role="timeout_worker",instance="worker-a"}'
        values: '0+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: GoOrderRabbitMQSessionUnavailable
        exp_alerts:
          - exp_labels:
              category: rabbitmq
              role: timeout_worker
              severity: critical
            exp_annotations:
              summary: Go Order RabbitMQ application session is unavailable
              description: All observed timeout_worker RabbitMQ sessions have remained disconnected for two minutes.

  - name: healthy-rabbitmq-session-does-not-fire
    interval: 1m
    input_series:
      - series: 'go_order_rabbitmq_session_up{role="timeout_worker",instance="worker-a"}'
        values: '1+0x5'
    alert_rule_test:
      - eval_time: 3m
        alertname: GoOrderRabbitMQSessionUnavailable
        exp_alerts: []

  - name: migration-job-terminal-failure-fires
    interval: 1m
    input_series:
      - series: 'kube_job_failed{condition="true",namespace="go-order-system",job_name="ordering-migrate"}'
        values: '1+0x4'
    alert_rule_test:
      - eval_time: 2m
        alertname: GoOrderMigrationJobFailed
        exp_alerts:
          - exp_labels:
              category: migration
              job_name: ordering-migrate
              namespace: go-order-system
              severity: critical
            exp_annotations:
              summary: Go Order database migration Job failed
              description: Migration Job go-order-system/ordering-migrate reports a terminal Failed condition.

  - name: retried-migration-that-recovers-does-not-fire
    interval: 1m
    input_series:
      - series: 'kube_job_status_failed{reason="Error",namespace="go-order-system",job_name="ordering-migrate"}'
        values: '1+0x4'
      - series: 'kube_job_complete{condition="true",namespace="go-order-system",job_name="ordering-migrate"}'
        values: '0 0 1 1 1'
    alert_rule_test:
      - eval_time: 3m
        alertname: GoOrderMigrationJobFailed
        exp_alerts: []
