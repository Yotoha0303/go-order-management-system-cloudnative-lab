apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

secretGenerator:
  - name: app-secrets
    namespace: go-order-system
    literals:
      - MYSQL_PASSWORD=local-dev-password
      - JWT_SECRET=local-development-jwt-secret-at-least-32-characters
      - INTERNAL_SERVICE_TOKEN=local-development-internal-service-token
      - RABBITMQ_USER=order_app
      - RABBITMQ_PASSWORD=order_dev_password
      - RABBITMQ_URL=amqp://order_app:order_dev_password@rabbitmq:5672/

generatorOptions:
  disableNameSuffixHash: true

patches:
  - path: gateway-nodeport.yaml
