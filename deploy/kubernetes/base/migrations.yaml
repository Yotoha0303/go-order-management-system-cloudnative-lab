apiVersion: batch/v1
kind: Job
metadata:
  name: identity-migrate
  labels:
    app.kubernetes.io/name: identity-migrate
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-migrate
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      initContainers:
        - name: ensure-database
          image: mysql:8.4
          env:
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MYSQL_PASSWORD
          command: ["sh", "-ec"]
          args:
            - |
              until mysqladmin ping --protocol=tcp -h mysql -P 3306 -uroot --silent; do sleep 2; done
              mysql -h mysql -P 3306 -uroot -e 'CREATE DATABASE IF NOT EXISTS `go_order_identity` CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;'
      containers:
        - name: migrate
          image: go-order-management-system/identity-service:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: DB_NAME
              value: go_order_identity
          command: ["sh", "-ec"]
          args:
            - exec ./goose -dir ./migrations/identity mysql "$DB_USER:$MYSQL_PASSWORD@tcp($DB_HOST:$DB_PORT)/$DB_NAME?parseTime=true" up
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
