---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8086"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-timeout-worker
spec:
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9091"
    spec:
      containers:
        - name: order-timeout-worker
          ports:
            - name: metrics
              containerPort: 9091
          env:
            - name: METRICS_ADDR
              value: :9091
---
