apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8082
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: go-order-management-system/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: GATEWAY_PORT
              value: "8082"
            - name: IDENTITY_SERVICE_URL
              value: http://identity-service:8083
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:8084
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:8085
            - name: ORDER_SERVICE_URL
              value: http://order-service:8086
          startupProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  labels:
    app.kubernetes.io/name: identity-service
spec:
  selector:
    app.kubernetes.io/name: identity-service
  ports:
    - name: http
      port: 8083
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-service
    spec:
      initContainers:
        - name: wait-for-schema
          image: mysql:8.4
          env:
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MYSQL_PASSWORD
            - name: DB_NAME
              value: go_order_identity
            - name: EXPECTED_TABLE
              value: users
          command: ["sh", "-ec"]
          args:
            - until mysql -h mysql -P 3306 -uroot "$DB_NAME" -e "SELECT 1 FROM $EXPECTED_TABLE LIMIT 1" >/dev/null 2>&1; do sleep 2; done
      containers:
        - name: identity-service
          image: go-order-management-system/identity-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: APP_PORT
              value: "8083"
            - name: DB_NAME
              value: go_order_identity
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
