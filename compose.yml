x-common-environment: &common-environment
  DB_HOST: mysql
  DB_PORT: 3306
  DB_USER: root
  DB_NAME: ${DB_NAME:-go_order_management_system}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
  RABBITMQ_URL: amqp://${RABBITMQ_USER:-order_app}:${RABBITMQ_PASSWORD:-order_dev_password}@rabbitmq:5672/
  ORDER_TIMEOUT_DELAY: ${ORDER_TIMEOUT_DELAY:-30m}

services:
  api-gateway:
    image: go-order-management-system/api-gateway:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: api-gateway
    container_name: go-order-management-system-api-gateway
    ports:
      - "${GATEWAY_HOST_PORT:-8082}:8082"
    environment:
      GATEWAY_PORT: 8082
      IDENTITY_SERVICE_URL: http://identity-service:8083
      CATALOG_SERVICE_URL: http://catalog-service:8084
      INVENTORY_SERVICE_URL: http://inventory-service:8085
      ORDER_SERVICE_URL: http://order-service:8086
    depends_on:
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  identity-service:
    image: go-order-management-system/identity-service:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: identity-service
    container_name: go-order-management-system-identity-service
    expose:
      - "8083"
    environment:
      <<: *common-environment
      APP_PORT: 8083
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  catalog-service:
    image: go-order-management-system/catalog-service:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: catalog-service
    container_name: go-order-management-system-catalog-service
    expose:
      - "8084"
    environment:
      <<: *common-environment
      APP_PORT: 8084
      REDIS_ADDR: redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8084/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  inventory-service:
    image: go-order-management-system/inventory-service:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: inventory-service
    container_name: go-order-management-system-inventory-service
    expose:
      - "8085"
    environment:
      <<: *common-environment
      APP_PORT: 8085
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8085/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  order-service:
    image: go-order-management-system/order-service:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: order-service
    container_name: go-order-management-system-order-service
    expose:
      - "8086"
    environment:
      <<: *common-environment
      APP_PORT: 8086
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8086/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  order-timeout-worker:
    image: go-order-management-system/order-timeout-worker:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: order-timeout-worker
    container_name: go-order-management-system-order-timeout-worker
    environment:
      <<: *common-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    image: go-order-management-system/migrate:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: order-service
    container_name: go-order-management-system-migrate
    working_dir: /app
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_NAME: ${DB_NAME:-go_order_management_system}
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        exec ./goose -dir ./migrations mysql "$${DB_USER}:$${MYSQL_PASSWORD}@tcp($${DB_HOST}:$${DB_PORT})/$${DB_NAME}?parseTime=true" up
    restart: "no"

  mysql:
    image: mysql:8.4
    container_name: go-order-management-system-mysql
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-go_order_management_system}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: go-order-management-system-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: go-order-management-system-rabbitmq
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-order_app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-order_dev_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
