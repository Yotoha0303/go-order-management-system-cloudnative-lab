x-common-environment: &common-environment
  DB_HOST: mysql
  DB_PORT: 3306
  DB_USER: root
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?INTERNAL_SERVICE_TOKEN is required}
  RABBITMQ_URL: amqp://${RABBITMQ_USER:-order_app}:${RABBITMQ_PASSWORD:-order_dev_password}@rabbitmq:5672/
  ORDER_TIMEOUT_DELAY: ${ORDER_TIMEOUT_DELAY:-30m}
  HTTP_CIRCUIT_FAILURE_THRESHOLD: ${HTTP_CIRCUIT_FAILURE_THRESHOLD:-5}
  HTTP_CIRCUIT_OPEN_INTERVAL: ${HTTP_CIRCUIT_OPEN_INTERVAL:-5s}
  HTTP_CIRCUIT_HALF_OPEN_MAX_PROBES: ${HTTP_CIRCUIT_HALF_OPEN_MAX_PROBES:-1}

x-migration-environment: &migration-environment
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
  DB_HOST: mysql
  DB_PORT: 3306
  DB_USER: root

services:
  api-gateway:
    image: go-order-management-system/api-gateway:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: api-gateway
    container_name: go-order-management-system-api-gateway
    ports:
      - "${GATEWAY_HOST_PORT:-8082}:8082"
    environment:
      GATEWAY_PORT: 8082
      IDENTITY_SERVICE_URL: http://identity-service:8083
      CATALOG_SERVICE_URL: http://catalog-service:8084
      INVENTORY_SERVICE_URL: http://inventory-service:8085
      ORDER_SERVICE_URL: http://order-service:8086
      GATEWAY_RATE_LIMIT_PER_CLIENT_RPS: ${GATEWAY_RATE_LIMIT_PER_CLIENT_RPS:-50}
      GATEWAY_RATE_LIMIT_PER_CLIENT_BURST: ${GATEWAY_RATE_LIMIT_PER_CLIENT_BURST:-100}
      GATEWAY_RATE_LIMIT_GLOBAL_RPS: ${GATEWAY_RATE_LIMIT_GLOBAL_RPS:-500}
      GATEWAY_RATE_LIMIT_GLOBAL_BURST: ${GATEWAY_RATE_LIMIT_GLOBAL_BURST:-1000}
      GATEWAY_RATE_LIMIT_MAX_CLIENTS: ${GATEWAY_RATE_LIMIT_MAX_CLIENTS:-10000}
      GATEWAY_RATE_LIMIT_INACTIVE_TTL: ${GATEWAY_RATE_LIMIT_INACTIVE_TTL:-10m}
      GATEWAY_RATE_LIMIT_CLEANUP_INTERVAL: ${GATEWAY_RATE_LIMIT_CLEANUP_INTERVAL:-1m}
    depends_on:
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  identity-service:
    image: go-order-management-system/identity-service:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: identity-service
    container_name: go-order-management-system-identity-service
    expose:
      - "8083"
    environment:
      <<: *common-environment
      APP_PORT: 8083
      DB_NAME: ${IDENTITY_DB_NAME:-go_order_identity}
    depends_on:
      identity-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  catalog-service:
    image: go-order-management-system/catalog-service:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: catalog-service
    container_name: go-order-management-system-catalog-service
    expose:
      - "8084"
    environment:
      <<: *common-environment
      APP_PORT: 8084
      DB_NAME: ${CATALOG_DB_NAME:-go_order_catalog}
      IDENTITY_SERVICE_URL: http://identity-service:8083
    depends_on:
      catalog-migrate:
        condition: service_completed_successfully
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8084/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  inventory-service:
    image: go-order-management-system/inventory-service:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: inventory-service
    container_name: go-order-management-system-inventory-service
    expose:
      - "8085"
    environment:
      <<: *common-environment
      APP_PORT: 8085
      DB_NAME: ${INVENTORY_DB_NAME:-go_order_inventory}
      IDENTITY_SERVICE_URL: http://identity-service:8083
    depends_on:
      inventory-migrate:
        condition: service_completed_successfully
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8085/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  order-service:
    image: go-order-management-system/order-service:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: order-service
    container_name: go-order-management-system-order-service
    expose:
      - "8086"
    environment:
      <<: *common-environment
      APP_PORT: 8086
      DB_NAME: ${ORDER_DB_NAME:-go_order_ordering}
      CATALOG_SERVICE_URL: http://catalog-service:8084
      INVENTORY_SERVICE_URL: http://inventory-service:8085
    depends_on:
      ordering-migrate:
        condition: service_completed_successfully
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8086/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  order-timeout-worker:
    image: go-order-management-system/order-timeout-worker:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: order-timeout-worker
    environment:
      <<: *common-environment
      DB_NAME: ${ORDER_DB_NAME:-go_order_ordering}
      ORDER_SERVICE_URL: http://order-service:8086
      OUTBOX_LEASE_DURATION: ${OUTBOX_LEASE_DURATION:-30s}
    depends_on:
      ordering-migrate:
        condition: service_completed_successfully
      order-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  identity-migrate:
    image: go-order-management-system/identity-migrate:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: identity-service
    environment:
      <<: *migration-environment
      DB_NAME: ${IDENTITY_DB_NAME:-go_order_identity}
    depends_on:
      db-init:
        condition: service_completed_successfully
    command:
      - sh
      - -ec
      - |
        exec ./goose -dir ./migrations/identity mysql "$${DB_USER}:$${MYSQL_PASSWORD}@tcp($${DB_HOST}:$${DB_PORT})/$${DB_NAME}?parseTime=true" up
    restart: "no"

  catalog-migrate:
    image: go-order-management-system/catalog-migrate:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: catalog-service
    environment:
      <<: *migration-environment
      DB_NAME: ${CATALOG_DB_NAME:-go_order_catalog}
    depends_on:
      db-init:
        condition: service_completed_successfully
    command:
      - sh
      - -ec
      - |
        exec ./goose -dir ./migrations/catalog mysql "$${DB_USER}:$${MYSQL_PASSWORD}@tcp($${DB_HOST}:$${DB_PORT})/$${DB_NAME}?parseTime=true" up
    restart: "no"

  inventory-migrate:
    image: go-order-management-system/inventory-migrate:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: inventory-service
    environment:
      <<: *migration-environment
      DB_NAME: ${INVENTORY_DB_NAME:-go_order_inventory}
    depends_on:
      db-init:
        condition: service_completed_successfully
    command:
      - sh
      - -ec
      - |
        exec ./goose -dir ./migrations/inventory mysql "$${DB_USER}:$${MYSQL_PASSWORD}@tcp($${DB_HOST}:$${DB_PORT})/$${DB_NAME}?parseTime=true" up
    restart: "no"

  ordering-migrate:
    image: go-order-management-system/ordering-migrate:local
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: order-service
    environment:
      <<: *migration-environment
      DB_NAME: ${ORDER_DB_NAME:-go_order_ordering}
    depends_on:
      db-init:
        condition: service_completed_successfully
    command:
      - sh
      - -ec
      - |
        exec ./goose -dir ./migrations/ordering mysql "$${DB_USER}:$${MYSQL_PASSWORD}@tcp($${DB_HOST}:$${DB_PORT})/$${DB_NAME}?parseTime=true" up
    restart: "no"

  db-init:
    image: mysql:8.4
    container_name: go-order-management-system-db-init
    environment:
      MYSQL_PWD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        mysql -h mysql -uroot -e "
          CREATE DATABASE IF NOT EXISTS \`${IDENTITY_DB_NAME:-go_order_identity}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
          CREATE DATABASE IF NOT EXISTS \`${CATALOG_DB_NAME:-go_order_catalog}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
          CREATE DATABASE IF NOT EXISTS \`${INVENTORY_DB_NAME:-go_order_inventory}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
          CREATE DATABASE IF NOT EXISTS \`${ORDER_DB_NAME:-go_order_ordering}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
        "
    restart: "no"

  mysql:
    image: mysql:8.4
    container_name: go-order-management-system-mysql
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --protocol=tcp -h 127.0.0.1 -P 3306 -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: go-order-management-system-rabbitmq
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-order_app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-order_dev_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  mysql_data:
  rabbitmq_data:
