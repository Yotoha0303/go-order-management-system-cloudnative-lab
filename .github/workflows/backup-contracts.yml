name: Backup Contracts

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/mysql-backup-restore.yml"
      - ".github/workflows/backup-contracts.yml"
      - "scripts/backup/**"
      - "scripts/verify/backup-contracts.py"
      - "docs/verification/mysql-backup-restore.md"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/mysql-backup-restore.yml"
      - ".github/workflows/backup-contracts.yml"
      - "scripts/backup/**"
      - "scripts/verify/backup-contracts.py"
      - "docs/verification/mysql-backup-restore.md"

permissions:
  contents: read

concurrency:
  group: backup-contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify backup and isolated restore contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile backup tooling
        run: python3 -m compileall -q scripts/backup scripts/verify/backup-contracts.py

      - name: Test backup manifest tooling
        run: python3 -m unittest discover -s scripts/backup -p "test_*.py" -v

      - name: Validate backup shell syntax
        run: bash -n scripts/backup/run-backup-restore.sh

      - name: Verify backup workflow contracts
        run: python3 scripts/verify/backup-contracts.py
