name: Observability Stack

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: observability-stack-${{ github.ref }}
  cancel-in-progress: true

env:
  MYSQL_PASSWORD: ci-password
  JWT_SECRET: ci-jwt-secret-must-be-at-least-32-characters
  INTERNAL_SERVICE_TOKEN: ci-internal-service-token-must-be-long-and-random
  ORDER_TIMEOUT_DELAY: 3s
  RABBITMQ_USER: order_app
  RABBITMQ_PASSWORD: ci-rabbit-password
  MYSQL_HOST_PORT: "13306"
  RABBITMQ_HOST_PORT: "15673"
  RABBITMQ_MANAGEMENT_HOST_PORT: "25673"
  OUTBOX_LEASE_DURATION: 30s
  PROMETHEUS_HOST_PORT: "19090"
  PROMETHEUS_URL: http://127.0.0.1:19090
  GRAFANA_HOST_PORT: "13000"
  GRAFANA_URL: http://127.0.0.1:13000
  GRAFANA_ADMIN_USER: admin
  GRAFANA_ADMIN_PASSWORD: ci-grafana-password
  TEMPO_HOST_PORT: "13200"
  TEMPO_URL: http://127.0.0.1:13200
  OTEL_COLLECTOR_HTTP_HOST_PORT: "14318"
  TRACE_ID: 0123456789abcdef0123456789abcdef
  TRACEPARENT: 00-0123456789abcdef0123456789abcdef-0123456789abcdef-01
  TRACESTATE: goorder=ci

jobs:
  stack:
    name: Compose metrics, rules, dashboards and traces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate observability Compose configuration
        run: docker compose -f compose.yml -f compose.observability.yml config --quiet

      - name: Validate dashboard and provisioning contracts
        run: python3 scripts/verify/observability-contracts.py

      - name: Validate Prometheus configuration
        run: |
          docker run --rm \
            -v "${PWD}/deploy/prometheus:/etc/prometheus:ro" \
            --entrypoint /bin/promtool \
            prom/prometheus:v3.5.0 \
            check config /etc/prometheus/prometheus.yml

      - name: Test recording and alert rules
        run: |
          docker run --rm \
            -v "${PWD}/deploy/prometheus:/etc/prometheus:ro" \
            -w /etc/prometheus/tests \
            --entrypoint /bin/promtool \
            prom/prometheus:v3.5.0 \
            test rules /etc/prometheus/tests/rules.test.yml

      - name: Start application and observability stack
        run: |
          docker compose -f compose.yml -f compose.observability.yml up -d --build --wait \
            --scale order-timeout-worker=2 \
            --scale order-reconciliation-worker=2

      - name: Run complete Order Saga with W3C trace context
        run: sh scripts/smoke/microservices-saga.sh

      - name: Verify Prometheus targets, rules and metrics
        run: python3 scripts/smoke/prometheus-metrics.py

      - name: Verify Grafana provisioning
        run: python3 scripts/smoke/grafana-provisioning.py

      - name: Verify Tempo cross-service trace
        run: python3 scripts/smoke/tempo-trace.py

      - name: Collect diagnostics
        if: failure()
        run: |
          mkdir -p diagnostics/observability
          docker compose -f compose.yml -f compose.observability.yml ps -a > diagnostics/observability/compose-ps.txt || true
          docker compose -f compose.yml -f compose.observability.yml logs --no-color > diagnostics/observability/compose.log 2>&1 || true
          curl --silent --show-error "${PROMETHEUS_URL}/api/v1/targets" > diagnostics/observability/targets.json || true
          curl --silent --show-error "${PROMETHEUS_URL}/api/v1/rules" > diagnostics/observability/rules.json || true
          curl --silent --show-error "${PROMETHEUS_URL}/api/v1/query?query=service:http_requests:rate5m" > diagnostics/observability/recording-rules.json || true
          curl --silent --show-error "${GRAFANA_URL}/api/health" > diagnostics/observability/grafana-health.json || true
          curl --silent --show-error --user "${GRAFANA_ADMIN_USER}:${GRAFANA_ADMIN_PASSWORD}" \
            "${GRAFANA_URL}/api/datasources/uid/prometheus" > diagnostics/observability/grafana-prometheus-datasource.json || true
          curl --silent --show-error --user "${GRAFANA_ADMIN_USER}:${GRAFANA_ADMIN_PASSWORD}" \
            "${GRAFANA_URL}/api/datasources/uid/tempo" > diagnostics/observability/grafana-tempo-datasource.json || true
          curl --silent --show-error --user "${GRAFANA_ADMIN_USER}:${GRAFANA_ADMIN_PASSWORD}" \
            "${GRAFANA_URL}/api/dashboards/uid/go-order-overview" > diagnostics/observability/grafana-dashboard.json || true
          curl --silent --show-error "${TEMPO_URL}/ready" > diagnostics/observability/tempo-ready.txt || true
          curl --silent --show-error "${TEMPO_URL}/api/traces/${TRACE_ID}" > diagnostics/observability/tempo-trace.json || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: observability-stack-diagnostics
          path: diagnostics/observability
          retention-days: 7

      - name: Stop application and observability stack
        if: always()
        run: docker compose -f compose.yml -f compose.observability.yml down -v --remove-orphans
