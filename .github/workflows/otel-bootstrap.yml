name: OTel Bootstrap

on:
  push:
    branches: ["phase/07-opentelemetry-tracing"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: otel-bootstrap-phase-07
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      (github.event_name == 'push' && github.event.head_commit.message == 'feat: stage OpenTelemetry tracing implementation') ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: phase/07-opentelemetry-tracing
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Apply domain and smoke patches
        run: |
          git apply .github/otel-domain.patch
          git apply .github/otel-scripts.patch
      - name: Format, resolve modules and test
        run: |
          gofmt -w cmd internal
          go mod tidy
          go test ./...
      - name: Commit dependency lock and remove bootstrap
        run: |
          rm -f .github/workflows/otel-bootstrap.yml .github/otel-domain.patch .github/otel-scripts.patch
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then exit 1; fi
          git commit -m "feat: establish OpenTelemetry tracing foundation"
          git push origin HEAD:phase/07-opentelemetry-tracing
