name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly
  RUN_MYSQL_TEST: "1"
  RUN_REDIS_TEST: "1"
  RUN_RABBITMQ_TEST: "1"
  MYSQL_PASSWORD: ci-password
  MYSQL_TEST_PASSWORD: ci-password
  MYSQL_TEST_DATABASE: go_order_management_system_test
  JWT_SECRET: ci-jwt-secret-must-be-at-least-32-characters
  INTERNAL_SERVICE_TOKEN: ci-internal-service-token-must-be-long-and-random
  REDIS_ADDR: 127.0.0.1:6379
  RABBITMQ_URL: amqp://order_app:ci-rabbit-password@127.0.0.1:5672/
  RABBITMQ_USER: order_app
  RABBITMQ_PASSWORD: ci-rabbit-password
  MYSQL_HOST_PORT: "13306"
  RABBITMQ_HOST_PORT: "15673"
  RABBITMQ_MANAGEMENT_HOST_PORT: "25673"

jobs:
  quality:
    name: Test, Vet, Validate, Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ci-password
          MYSQL_DATABASE: go_order_management_system_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      rabbitmq:
        image: rabbitmq:4.1-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: order_app
          RABBITMQ_DEFAULT_PASS: ci-rabbit-password
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
          --health-start-period=10s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.1

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Run tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Build all Go packages
        run: go build ./...

      - name: Validate migrations
        run: goose -dir migrations validate

      - name: Build service binaries
        run: |
          mkdir -p bin
          for service in api-gateway identity-service catalog-service inventory-service order-service order-timeout-worker; do
            go build -trimpath -o "bin/${service}" "./cmd/${service}"
          done

      - name: Validate data-isolated Compose configuration
        run: docker compose config --quiet

      - name: Build microservice images
        run: docker compose build

      - name: Start data-isolated microservices
        run: docker compose up -d --wait

      - name: Verify gateway readiness
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8082/readyz
          docker compose ps

      - name: Stop microservices
        if: always()
        run: docker compose down -v --remove-orphans
