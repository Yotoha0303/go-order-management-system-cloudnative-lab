name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly
  RUN_MYSQL_TEST: "1"
  RUN_REDIS_TEST: "1"
  RUN_RABBITMQ_TEST: "1"
  MYSQL_PASSWORD: ci-password
  MYSQL_TEST_PASSWORD: ci-password
  MYSQL_TEST_DATABASE: go_order_management_system_test
  JWT_SECRET: ci-jwt-secret-must-be-at-least-32-characters
  INTERNAL_SERVICE_TOKEN: ci-internal-service-token-must-be-long-and-random
  ORDER_TIMEOUT_DELAY: 3s
  REDIS_ADDR: 127.0.0.1:6379
  RABBITMQ_URL: amqp://order_app:ci-rabbit-password@127.0.0.1:5672/
  RABBITMQ_USER: order_app
  RABBITMQ_PASSWORD: ci-rabbit-password
  MYSQL_HOST_PORT: "13306"
  RABBITMQ_HOST_PORT: "15673"
  RABBITMQ_MANAGEMENT_HOST_PORT: "25673"
  OUTBOX_LEASE_DURATION: 30s

jobs:
  quality:
    name: Test, Vet, Validate, Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ci-password
          MYSQL_DATABASE: go_order_management_system_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      rabbitmq:
        image: rabbitmq:4.1-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: order_app
          RABBITMQ_DEFAULT_PASS: ci-rabbit-password
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
          --health-start-period=10s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.1

      - name: Install kustomize
        run: go install sigs.k8s.io/kustomize/kustomize/v5@v5.7.1

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run golangci-lint
        id: lint
        continue-on-error: true
        run: golangci-lint run ./... > lint.log 2>&1

      - name: Upload lint diagnostics
        if: steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-log
          path: lint.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce lint result
        if: steps.lint.outcome == 'failure'
        run: |
          cat lint.log
          exit 1

      - name: Run tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Build all Go packages
        run: go build ./...

      - name: Validate legacy migrations
        run: goose -dir migrations validate

      - name: Validate service migrations
        run: |
          for domain in identity catalog inventory ordering; do
            goose -dir "migrations/${domain}" validate
          done

      - name: Build service binaries
        run: |
          mkdir -p bin
          for service in api-gateway identity-service catalog-service inventory-service order-service order-timeout-worker order-reconciliation-worker; do
            go build -trimpath -o "bin/${service}" "./cmd/${service}"
          done

      - name: Validate data-isolated Compose configuration
        run: docker compose config --quiet

      - name: Validate local Kubernetes Kustomize overlay
        run: |
          kustomize build deploy/kubernetes/overlays/local > kubernetes-local.yaml
          test -s kubernetes-local.yaml
          grep -q '^kind: StatefulSet$' kubernetes-local.yaml
          grep -q '^kind: Deployment$' kubernetes-local.yaml
          grep -q '^kind: Job$' kubernetes-local.yaml
          grep -q '^kind: Secret$' kubernetes-local.yaml

      - name: Build microservice images
        run: docker compose build

      - name: Start data-isolated microservices with worker replicas
        id: startup
        continue-on-error: true
        run: docker compose up -d --wait --scale order-timeout-worker=2 --scale order-reconciliation-worker=2

      - name: Collect startup diagnostics
        if: steps.startup.outcome == 'failure'
        run: |
          {
            echo '=== docker compose ps -a ==='
            docker compose ps -a
            echo
            echo '=== docker compose logs ==='
            docker compose logs --no-color --timestamps
          } > compose-startup.log 2>&1

      - name: Upload startup diagnostics
        if: steps.startup.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: compose-startup-log
          path: compose-startup.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce startup result
        if: steps.startup.outcome == 'failure'
        run: |
          cat compose-startup.log
          exit 1

      - name: Verify gateway readiness and worker replicas
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8082/readyz
          timeout_worker_count="$(docker compose ps -q order-timeout-worker | wc -l | tr -d ' ')"
          reconciliation_worker_count="$(docker compose ps -q order-reconciliation-worker | wc -l | tr -d ' ')"
          test "${timeout_worker_count}" -eq 2
          test "${reconciliation_worker_count}" -eq 2
          docker compose ps

      - name: Verify order Saga business flow
        run: sh scripts/smoke/microservices-saga.sh

      - name: Stop microservices
        if: always()
        run: docker compose down -v --remove-orphans

  kubernetes-runtime:
    name: kind Deploy, Rollback, Saga
    needs: quality
    runs-on: ubuntu-latest
    env:
      CLUSTER_NAME: go-order-ci
      KUBERNETES_NAMESPACE: go-order-system
      MYSQL_PASSWORD: local-dev-password
      BASE_URL: http://127.0.0.1:8082

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.27.0

      - name: Install kubectl
        run: |
          curl --fail --location --silent --show-error \
            --output kubectl \
            https://dl.k8s.io/release/v1.32.2/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Verify Kubernetes tools
        run: |
          kind version
          kubectl version --client

      - name: Deploy local Kubernetes topology
        run: sh scripts/k8s/deploy-local.sh

      - name: Verify exposure and worker replicas
        run: |
          test "$(kubectl -n "$KUBERNETES_NAMESPACE" get service api-gateway -o jsonpath='{.spec.type}')" = NodePort
          for service in identity-service catalog-service inventory-service order-service mysql rabbitmq; do
            test "$(kubectl -n "$KUBERNETES_NAMESPACE" get service "$service" -o jsonpath='{.spec.type}')" = ClusterIP
          done
          test "$(kubectl -n "$KUBERNETES_NAMESPACE" get deployment order-timeout-worker -o jsonpath='{.status.readyReplicas}')" = 2
          test "$(kubectl -n "$KUBERNETES_NAMESPACE" get deployment order-reconciliation-worker -o jsonpath='{.status.readyReplicas}')" = 2
          curl --fail --silent --show-error "$BASE_URL/readyz"

      - name: Exercise failed rollout and rollback
        run: |
          kubectl -n "$KUBERNETES_NAMESPACE" set image \
            deployment/api-gateway \
            api-gateway=go-order-management-system/api-gateway:missing-ci-image

          if kubectl -n "$KUBERNETES_NAMESPACE" rollout status \
            deployment/api-gateway \
            --timeout=45s; then
            echo 'bad image rollout unexpectedly succeeded' >&2
            exit 1
          fi

          kubectl -n "$KUBERNETES_NAMESPACE" rollout undo deployment/api-gateway
          kubectl -n "$KUBERNETES_NAMESPACE" rollout status deployment/api-gateway --timeout=180s

          current_image="$(kubectl -n "$KUBERNETES_NAMESPACE" get deployment api-gateway -o jsonpath='{.spec.template.spec.containers[0].image}')"
          test "$current_image" = go-order-management-system/api-gateway:local
          curl --fail --silent --show-error "$BASE_URL/readyz"

      - name: Verify Kubernetes Order Saga
        run: sh scripts/smoke/microservices-saga-kubernetes.sh

      - name: Collect Kubernetes diagnostics
        if: failure()
        run: |
          mkdir -p kubernetes-diagnostics
          kubectl -n "$KUBERNETES_NAMESPACE" get all -o wide > kubernetes-diagnostics/resources.txt 2>&1 || true
          kubectl -n "$KUBERNETES_NAMESPACE" get jobs,pvc -o wide > kubernetes-diagnostics/jobs-pvc.txt 2>&1 || true
          kubectl -n "$KUBERNETES_NAMESPACE" get events --sort-by=.lastTimestamp > kubernetes-diagnostics/events.txt 2>&1 || true
          kubectl -n "$KUBERNETES_NAMESPACE" describe pods > kubernetes-diagnostics/pods-describe.txt 2>&1 || true
          for pod in $(kubectl -n "$KUBERNETES_NAMESPACE" get pods -o name 2>/dev/null); do
            name="$(printf '%s' "$pod" | tr '/' '-')"
            kubectl -n "$KUBERNETES_NAMESPACE" logs "$pod" --all-containers --prefix > "kubernetes-diagnostics/${name}.log" 2>&1 || true
          done
          kind export logs kubernetes-diagnostics/kind --name "$CLUSTER_NAME" || true

      - name: Upload Kubernetes diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kubernetes-runtime-diagnostics
          path: kubernetes-diagnostics
          if-no-files-found: warn
          retention-days: 7

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "$CLUSTER_NAME"
