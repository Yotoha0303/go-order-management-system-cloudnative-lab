name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly
  RUN_MYSQL_TEST: "1"
  RUN_REDIS_TEST: "1"
  MYSQL_TEST_PASSWORD: ci-password
  MYSQL_TEST_DATABASE: go_order_inventory_test
  REDIS_ADDR: 127.0.0.1:6379

jobs:
  quality:
    name: Test, Vet, Validate, Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ci-password
          MYSQL_DATABASE: go_order_inventory_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Run test
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.1

      - name: Validate migrations
        run: goose -dir migrations validate

      - name: Build binary
        run: go build -o bin/go-order-management-system ./cmd

      - name: Build Docker image
        run: docker build -t go-order-management-system:ci .
