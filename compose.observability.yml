x-otel-environment: &otel-environment
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1}
  OTEL_DEPLOYMENT_ENVIRONMENT: compose-local

services:
  api-gateway:
    environment:
      <<: *otel-environment

  identity-service:
    environment:
      <<: *otel-environment

  catalog-service:
    environment:
      <<: *otel-environment

  inventory-service:
    environment:
      <<: *otel-environment

  order-service:
    environment:
      <<: *otel-environment

  order-timeout-worker:
    environment:
      <<: *otel-environment
      METRICS_ADDR: :9091
      RABBITMQ_MANAGEMENT_URL: http://rabbitmq:15672
      RABBITMQ_MANAGEMENT_METRICS_TIMEOUT: ${RABBITMQ_MANAGEMENT_METRICS_TIMEOUT:-2s}
    expose:
      - "9091"

  order-reconciliation-worker:
    environment:
      <<: *otel-environment
      METRICS_ADDR: :9092
    expose:
      - "9092"

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: go-order-management-system-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    depends_on:
      api-gateway:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      order-timeout-worker:
        condition: service_started
      order-reconciliation-worker:
        condition: service_started
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.10.7
    container_name: go-order-management-system-tempo
    command:
      - -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./deploy/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_HOST_PORT:-3200}:3200"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    container_name: go-order-management-system-otel-collector
    command:
      - --config=/etc/otelcol-contrib/collector.yml
    volumes:
      - ./deploy/otel/collector.yml:/etc/otelcol-contrib/collector.yml:ro
    ports:
      - "${OTEL_COLLECTOR_HTTP_HOST_PORT:-14318}:4318"
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.0
    container_name: go-order-management-system-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
