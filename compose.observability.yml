services:
  order-timeout-worker:
    environment:
      METRICS_ADDR: :9091
    expose:
      - "9091"

  order-reconciliation-worker:
    environment:
      METRICS_ADDR: :9092
    expose:
      - "9092"

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: go-order-management-system-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    depends_on:
      api-gateway:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      order-timeout-worker:
        condition: service_started
      order-reconciliation-worker:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.0
    container_name: go-order-management-system-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
